name: Windows build

# PyInstaller cannot cross-compile, so the Windows build runs on a Windows
# runner (issue #5). It's a one-directory bundle (issue #17) for fast startup;
# the folder is attached to each run (zipped) for download and manual
# verification on a clean Windows 10/11 machine.

on:
  workflow_dispatch:  # manual-only — run from the Actions tab when a build is wanted

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Match the PyMeshLab wheel pinned in the dev env (cp313).
          python-version: "3.13"

      - name: Install app + packaging deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,packaging]"

      - name: Build one-directory bundle
        run: pyinstaller --noconfirm --clean polycut.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # upload-artifact zips the whole folder; the user unzips and runs the
          # Polycut.exe inside it.
          name: Polycut-windows
          path: dist/Polycut
          if-no-files-found: error
